version: '3.8'

services:
  # ========== AI 服务 ==========
  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shop-copilot-ai
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../uploads:/app/uploads
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Redis 服务 ==========
  redis:
    image: redis:7-alpine
    container_name: shop-copilot-redis
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
